<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="header">
        <span>Library</span>
    </div>
    <div class="main">
        <div class="title">Title</div>
        <div class="author">Author</div>
        <div class="pages">Pages</div>
        <div class="read">Read</div>
        <button id="addBook">New</button>
    </div>
    <dialog id="dialogForm">
         <span>Create a new book</span>
        <form method="dialog">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>
            <label for="author">Author</label>
            <input type="text" id="author" name="author" required>
            <label for="pages">Pages</label>
            <input type="number" name="author" id="pages" min="1" max="10000" step="1">
            <label class="read-container">
            <input type="checkbox" id="checkbox">Read</label>
            <div class="btns">
                <button id="btnCancel">Cancel</button>
                <button id="btnCreate">Create</button>
            </div>
        </form>
    </dialog>

</body>
</html>
